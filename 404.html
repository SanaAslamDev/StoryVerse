<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | StoryVerse</title>

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/404.css" />
</head>

<body>

  <div class="error-page">

    <!-- Decorative background shapes -->
    <div class="error-blob error-blob--1"></div>
    <div class="error-blob error-blob--2"></div>
    <div class="error-blob error-blob--3"></div>

    <!-- Main content -->
    <div class="error-content">

      <!-- Logo link -->
      <a href="index.html" class="error-logo">✦ StoryVerse</a>

      <!-- Big 404 number -->
      <div class="error-number">
        <span class="error-number-4 error-number-4--left">4</span>
        <span class="error-number-0">0</span>
        <span class="error-number-4 error-number-4--right">4</span>
      </div>

      <!-- Message -->
      <h1 class="error-title">Oops! Page not found.</h1>
      <p class="error-subtext">
        The page you're looking for doesn't exist, was moved,
        or maybe never existed at all. Let's get you back on track.
      </p>

      <!-- Action buttons -->
      <div class="error-actions">
        <a href="index.html" class="btn btn--primary btn--lg">
          ← Back to Home
        </a>
        <a href="explore.html" class="btn btn--yellow btn--lg">
          Explore Articles
        </a>
      </div>

      <!-- Helpful links -->
      <div class="error-links">
        <p class="error-links-label">Or go directly to:</p>
        <div class="error-links-row">
          <a href="login.html" class="error-link">Sign In</a>
          <a href="register.html" class="error-link">Register</a>
          <a href="write.html" class="error-link">Write</a>
          <a href="dashboard.html" class="error-link">Dashboard</a>
        </div>
      </div>

    </div>

  </div>

  <script src="js/app.js"></script>
  <script src="js/theme.js"></script>

</body>
</html>
