<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — StoryVerse</title>

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>

  <!-- Back to home link -->
  <a href="index.html" class="auth-back-link">
    ← Back to StoryVerse
  </a>

  <div class="auth-page">

    <!-- Left panel (same on both pages) -->
    <div class="auth-panel">
      <div class="auth-panel-content">

        <div class="auth-panel-logo">✦ StoryVerse</div>

        <h2 class="auth-panel-headline">
          Good to see you again
        </h2>

        <p class="auth-panel-subtext">
          Your stories, drafts, and bookmarks are waiting for you.
        </p>

        <div class="auth-panel-quote">
          <p>"StoryVerse is where I do my best writing. Nothing else comes close."</p>
          <div class="auth-panel-quote-author">
            <img src="https://i.pravatar.cc/36?img=8" alt="David Kim" />
            <span>David Kim, Frontend Engineer</span>
          </div>
        </div>

      </div>
    </div>

    <!-- Right side: login form -->
    <div class="auth-form-side">
      <div class="auth-form-box">

        <h1 class="auth-form-title">Welcome back</h1>
        <p class="auth-form-subtitle">
          Don't have an account?
          <a href="register.html" class="auth-switch-link">Sign up free</a>
        </p>

        <!-- Error message -->
        <div class="auth-error-box" id="loginErrorBox">
          <span id="loginErrorText"></span>
        </div>

        <!-- Login Form -->
        <form class="auth-form" id="loginForm">

          <!-- Email -->
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email Address</label>
            <input
              type="email"
              id="loginEmail"
              class="form-input"
              placeholder="abc@example.com"
              autocomplete="email"
            />
          </div>

          <!-- Password -->
          <div class="form-group">
            <div class="form-label-row">
              <label class="form-label" for="loginPassword">Password</label>
              <a href="#" class="form-forgot-link">Forgot password?</a>
            </div>
            <div class="form-input-icon-wrapper">
              <input
                type="password"
                id="loginPassword"
                class="form-input"
                placeholder="Your password"
                autocomplete="current-password"
              />
              <button
                type="button"
                class="form-password-toggle"
                id="loginPasswordToggle"
                aria-label="Toggle password visibility"
              >
                👁
              </button>
            </div>
          </div>

          <!-- Submit button -->
          <button type="submit" class="btn btn--primary btn--full auth-submit-btn">
            Sign In
          </button>

        </form>

      </div>
    </div>

  </div>

  <script src="js/app.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>

</body>
</html>
