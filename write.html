<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Write - StoryVerse</title>

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/write.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>
  <header class="write-topbar">
    <div class="write-topbar-left">
      <a href="dashboard.html" class="write-back-link">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <path d="M19 12H5M12 19l-7-7 7-7"></path>
        </svg>
        Dashboard
      </a>
      <span class="write-topbar-divider">|</span>
      <span class="write-topbar-logo">Draft</span>
    </div>

    <div class="write-status" id="writeStatus">
      <span class="write-status-dot"></span>
      <span class="write-status-text" id="writeStatusText">Draft</span>
    </div>

    <div class="write-topbar-right">
      <span class="write-reading-time" id="writeReadingTime">0 min read</span>
      <button class="btn btn--ghost btn--sm" id="saveDraftBtn">Save Draft</button>
      <button class="btn btn--primary btn--sm" id="publishBtn">Publish</button>
    </div>
  </header>

  <main class="write-main">
    <div class="write-container">
      <div class="write-cover-area" id="writeCoverArea">
        <input
          type="file"
          id="coverImageInput"
          accept="image/*"
          style="display: none;"
        />

        <div class="write-cover-placeholder" id="coverPlaceholder">
          <svg width="68" height="68" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <path d="m21 15-5-5L5 21"></path>
          </svg>
          <span>Click to add a cover image</span>
        </div>

        <img
          src=""
          alt="Cover image"
          class="write-cover-preview"
          id="coverPreview"
          style="display: none;"
        />
      </div>

      <div class="write-meta-row">
       <select class="write-category-select" id="writeCategorySelect">
          <option value="">Select a category...</option>
          <option value="Stories & Fiction">Stories & Fiction</option>
          <option value="Travel"> Travel & Adventure</option>
          <option value="Technology"> Technology</option>
          <option value="News & Current Affairs">News & Current Affairs</option>
          <option value="Knowledge & Learning"> Education & Learning</option>
          <option value="Health & Wellness"> Health & Wellness</option>
          <option value="Art & Creativity"> Arts & Culture</option>
          <option value="Lifestyle"> Lifestyle & Society</option>
          <option value="Ideas & Innovation">  Ideas & Perspectives</option>
        </select>
      </div>

      <textarea
        class="write-title-input"
        id="writeTitleInput"
        placeholder="Your article title..."
        rows="1"
        maxlength="120"
      ></textarea>

      <textarea
        class="write-excerpt-input"
        id="writeExcerptInput"
        placeholder="Write a short summary of your article (shown in cards and previews)..."
        rows="2"
        maxlength="200"
      ></textarea>

      <div class="write-divider"></div>

      <textarea
        class="write-body-input"
        id="writeBodyInput"
        placeholder="Tell your story..."
      ></textarea>
    </div>
  </main>

  <div class="toast" id="toastNotification">
    <span id="toastMessage"></span>
  </div>

  <script src="js/app.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/write.js"></script>
</body>
</html>
