<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Write — StoryVerse</title>

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/write.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>

  <!-- =============================================
       WRITE PAGE TOPBAR
       Minimal header — just logo, status, and actions
       ============================================= -->
  <header class="write-topbar">

    <!-- Left: back link and logo -->
    <div class="write-topbar-left">
      <a href="dashboard.html" class="write-back-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Dashboard
      </a>
      <span class="write-topbar-divider">|</span>
      <span class="write-topbar-logo">✦ StoryVerse</span>
    </div>

    <!-- Center: autosave status indicator -->
    <div class="write-status" id="writeStatus">
      <span class="write-status-dot"></span>
      <span class="write-status-text" id="writeStatusText">Draft</span>
    </div>

    <!-- Right: action buttons -->
    <div class="write-topbar-right">
      <span class="write-reading-time" id="writeReadingTime">0 min read</span>
      <button class="btn btn--ghost btn--sm" id="saveDraftBtn">Save Draft</button>
      <button class="btn btn--primary btn--sm" id="publishBtn">Publish</button>
    </div>

  </header>

  <!-- =============================================
       WRITE PAGE BODY
       Clean, distraction-free writing area
       ============================================= -->
  <main class="write-main">
    <div class="write-container">

      <!-- Cover image upload area -->
      <div class="write-cover-area" id="writeCoverArea">
        <input
          type="file"
          id="coverImageInput"
          accept="image/*"
          style="display: none;"
        />
        <div class="write-cover-placeholder" id="coverPlaceholder">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>Click to add a cover image</span>
        </div>
        <img
          src=""
          alt="Cover image"
          class="write-cover-preview"
          id="coverPreview"
          style="display: none;"
        />
      </div>

      <!-- Category selector -->
      <div class="write-meta-row">
        <select class="write-category-select" id="writeCategorySelect">
          <option value="">Select a category...</option>
          <option value="Programming">Programming</option>
          <option value="Artificial Intelligence">Artificial Intelligence</option>
          <option value="Web Development">Web Development</option>
          <option value="Design">Design</option>
          <option value="Business">Business</option>
          <option value="Career">Career</option>
          <option value="Technology">Technology</option>
          <option value="Data Science">Data Science</option>
          <option value="Cyber Security">Cyber Security</option>
          <option value="Travel">Travel</option>
          <option value="Health">Health</option>
          <option value="Finance">Finance</option>
          <option value="Science">Science</option>
          <option value="Productivity">Productivity</option>
          <option value="Lifestyle">Lifestyle</option>
          <option value="Personal Growth">Personal Growth</option>
          <option value="Food">Food</option>
          <option value="Gaming">Gaming</option>
        </select>
      </div>

      <!-- Article title -->
      <textarea
        class="write-title-input"
        id="writeTitleInput"
        placeholder="Your article title..."
        rows="1"
        maxlength="120"
      ></textarea>

      <!-- Excerpt / summary -->
      <textarea
        class="write-excerpt-input"
        id="writeExcerptInput"
        placeholder="Write a short summary of your article (shown in cards and previews)..."
        rows="2"
        maxlength="200"
      ></textarea>

      <!-- Divider between meta and body -->
      <div class="write-divider"></div>

      <!-- Main article body -->
      <textarea
        class="write-body-input"
        id="writeBodyInput"
        placeholder="Tell your story..."
      ></textarea>

    </div>
  </main>

  <!-- Toast notification (shows briefly on save/publish) -->
  <div class="toast" id="toastNotification">
    <span id="toastMessage"></span>
  </div>

  <script src="js/app.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/write.js"></script>

</body>
</html>
